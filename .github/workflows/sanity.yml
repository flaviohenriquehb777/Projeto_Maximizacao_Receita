name: CI Sanity

on:
  push:
  pull_request:
  workflow_dispatch:
  schedule:
    - cron: '0 10 * * *'

jobs:
  smoke:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Print environment
        run: |
          echo "Repo: ${{ github.repository }}"
          echo "Ref: ${{ github.ref }}"
          echo "Runner OS: ${{ runner.os }}"
          echo "Actor: ${{ github.actor }}"
          python --version || true
          uname -a || true