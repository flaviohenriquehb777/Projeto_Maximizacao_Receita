name: MLOps CI

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  build-train:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: [ '3.10', '3.11' ]
    env:
      PYTHONPATH: ${{ github.workspace }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: 'pip'

      - name: Cache DVC
        uses: actions/cache@v4
        with:
          path: .dvc/cache
          key: ${{ runner.os }}-dvc-${{ hashFiles('dvc.lock') }}
          restore-keys: |
            ${{ runner.os }}-dvc-

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run pre-commit (format/lint)
        run: |
          pre-commit run --all-files --show-diff-on-failure

      - name: Configure env (DagsHub/MLflow)
        env:
          DAGSHUB_OWNER: ${{ secrets.DAGSHUB_OWNER }}
          DAGSHUB_REPO: ${{ secrets.DAGSHUB_REPO }}
          DAGSHUB_TOKEN: ${{ secrets.DAGSHUB_TOKEN }}
          MLFLOW_TRACKING_URI: ${{ secrets.MLFLOW_TRACKING_URI }}
        run: |
          echo "DAGSHUB_OWNER=${DAGSHUB_OWNER}" >> $GITHUB_ENV
          echo "DAGSHUB_REPO=${DAGSHUB_REPO}" >> $GITHUB_ENV
          echo "DAGSHUB_TOKEN=${DAGSHUB_TOKEN}" >> $GITHUB_ENV
          echo "MLFLOW_TRACKING_URI=${MLFLOW_TRACKING_URI}" >> $GITHUB_ENV

      - name: Ensure default DVC remote (DagsHub)
        if: ${{ env.DAGSHUB_OWNER != '' && env.DAGSHUB_REPO != '' }}
        run: |
          if [ -n "${DAGSHUB_OWNER}" ] && [ -n "${DAGSHUB_REPO}" ]; then
            if dvc remote list | grep -q "dagshub"; then
              echo "Remote 'dagshub' already present";
            else
              dvc remote add -d dagshub "https://dagshub.com/${DAGSHUB_OWNER}/${DAGSHUB_REPO}.dvc";
            fi
            if [ -n "${DAGSHUB_TOKEN}" ]; then
              dvc remote modify dagshub auth basic
              dvc remote modify dagshub user "${DAGSHUB_OWNER}"
              dvc remote modify dagshub password "${DAGSHUB_TOKEN}"
            fi
          else
            echo "DAGSHUB env not set; skipping remote setup";
          fi

      - name: DVC pull & checkout dataset only
        if: ${{ env.DAGSHUB_OWNER != '' && env.DAGSHUB_REPO != '' }}
        continue-on-error: true
        run: |
          echo "Trying to pull dataset via DVC..."
          dvc pull -r dagshub dados/dadosVenda.xlsx.dvc || echo "DVC pull failed; continuing"
          dvc checkout dados/dadosVenda.xlsx.dvc || echo "DVC checkout failed; continuing"

      - name: Run tests (pytest with coverage)
        run: |
          pytest -q --cov=src --cov-report=xml --cov-report=html

      - name: Upload coverage report
        uses: actions/upload-artifact@v4
        with:
          name: coverage-xml
          path: coverage.xml

      - name: Upload coverage HTML
        uses: actions/upload-artifact@v4
        with:
          name: coverage-html
          path: htmlcov/

      - name: Type check (mypy)
        run: |
          mypy src --ignore-missing-imports

      - name: Train model
        run: |
          python src/train.py

      - name: Run experiments (log to MLflow/DagsHub)
        env:
          DAGSHUB_OWNER: ${{ env.DAGSHUB_OWNER }}
          DAGSHUB_REPO: ${{ env.DAGSHUB_REPO }}
          DAGSHUB_TOKEN: ${{ env.DAGSHUB_TOKEN }}
          MLFLOW_TRACKING_URI: ${{ env.MLFLOW_TRACKING_URI }}
        run: |
          python src/experiments.py

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: model-and-metrics
          path: |
            models/model_linear.joblib
            artifacts/metrics.json
            models/model_best.joblib
            artifacts/metrics_best.json
        if: ${{ hashFiles('models/model_linear.joblib') != '' || hashFiles('models/model_best.joblib') != '' }}