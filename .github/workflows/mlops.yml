name: MLOps CI

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-train:
    runs-on: ubuntu-latest
    env:
      PYTHONPATH: ${{ github.workspace }}
    steps:
      - name: Checkout
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"
          cache: 'pip'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Treinar e gerar métricas (fallback simples)
        run: |
          mkdir -p artifacts models || true
          python src/train.py || true
          python src/experiments.py || true

      - name: Job summary (metrics)
        if: ${{ always() }}
        run: |
          echo "# Resultados do Pipeline" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "## Métricas do treino (artifacts/metrics.json)" >> "$GITHUB_STEP_SUMMARY"
          python -c "import json, os, os.path as p; s=os.environ['GITHUB_STEP_SUMMARY']; f='artifacts/metrics.json'; open(s,'a',encoding='utf-8').write(('- Treino:\n'+''.join(f'  - {k}: {v}\n' for k,v in json.load(open(f,'r',encoding='utf-8')).items())) if p.exists(f) else '- Treino: arquivo não encontrado\n')"
          echo "## Métricas dos experimentos (artifacts/metrics_best.json)" >> "$GITHUB_STEP_SUMMARY"
          python -c "import json, os, os.path as p; s=os.environ['GITHUB_STEP_SUMMARY']; f='artifacts/metrics_best.json'; open(s,'a',encoding='utf-8').write(('- Melhor modelo:\n'+''.join(f'  - {k}: {v}\n' for k,v in json.load(open(f,'r',encoding='utf-8')).items())) if p.exists(f) else '- Melhor modelo: arquivo não encontrado\n')"

      - name: Upload artifacts (se disponíveis)
        if: ${{ hashFiles('artifacts/metrics.json') != '' || hashFiles('artifacts/metrics_best.json') != '' }}
        uses: actions/upload-artifact@v4
        with:
          name: model-and-metrics
          path: |
            artifacts/metrics.json
            artifacts/metrics_best.json
        # EOF