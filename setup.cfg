[flake8]
max-line-length = 88
extend-ignore = E203, W503
exclude = .git,__pycache__,build,dist
per-file-ignores =
    src/config/graficos.py:F841
    src/experiments.py:F841,E402
    src/train.py:E402
    tests/test_train.py:F401
    src/config/auxiliares_testes.py:E501

[isort]
profile = black
line_length = 88